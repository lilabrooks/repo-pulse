# Map source areas to the specs and ADRs that govern them. The `scripts/okf
# check-stale` command uses this file to catch cases where source changed but
# the mapped knowledge file was not touched.
#
# Keep patterns repo-relative. Quote glob patterns so YAML readers do not treat
# `*` as an alias marker.

mappings:
  - source: "app/**"
    docs:
      - "docs/specs/api.md"
      - "docs/adr/0001-python-web-stack.md"
      - "docs/adr/0002-in-memory-ttl-cache.md"

  - source: "static/**"
    docs:
      - "docs/specs/frontend.md"

  - source: "requirements.txt"
    docs:
      - "docs/adr/0001-python-web-stack.md"

  - source: "Makefile"
    docs:
      - "docs/adr/0001-python-web-stack.md"
      - "docs/adr/0002-in-memory-ttl-cache.md"

  - source: ".github/dependabot.yml"
    docs:
      - "docs/adr/0001-python-web-stack.md"
      - "docs/adr/0004-github-actions-ci.md"

  - source: ".github/workflows/**"
    docs:
      - "docs/adr/0004-github-actions-ci.md"

# Second-agent hook mirrors (kit ADR 0021): the safe updater keeps these
# byte-identical to .claude/hooks/ on every kit upgrade.
mirrors:
  - .codex/hooks
